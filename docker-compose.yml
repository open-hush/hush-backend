# Local development stack for the Hush backend.
#
# `docker compose up -d` brings up Postgres and MinIO (S3-compatible object
# storage) so `cargo run -p api` and `cd dashboard && npm run dev` can talk
# to them out of the box.
#
# Production deploys this stack differently:
#   - Postgres → managed service (e.g. Supabase, Neon, RDS).
#   - MinIO    → Cloudflare R2 or AWS S3.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hush
      POSTGRES_PASSWORD: hush
      POSTGRES_DB: hush
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hush -d hush"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hushminio
      MINIO_ROOT_PASSWORD: hushminio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the bucket on startup; idempotent.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 hushminio hushminio &&
      mc mb --ignore-existing local/hush-audio &&
      mc anonymous set download local/hush-audio
      "

volumes:
  pgdata:
  miniodata:
