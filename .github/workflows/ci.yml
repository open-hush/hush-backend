name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: api (fastify)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hush
          POSTGRES_PASSWORD: hush
          POSTGRES_DB: hush
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hush"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://hush:hush@localhost:5432/hush
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: migrate
        run: pnpm run migrate:up

      - name: typecheck
        run: pnpm run typecheck

      - name: lint
        run: pnpm run lint

      - name: test
        run: pnpm run test

      - name: build
        run: pnpm run build

  dashboard:
    name: dashboard (next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm run typecheck

      - name: lint
        run: pnpm run lint

      - name: build
        run: pnpm run build
